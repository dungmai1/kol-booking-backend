services:
  postgres:
    image: "postgres:16-alpine"
    container_name: kol-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kol_booking
      POSTGRES_USER: kol_user
      POSTGRES_PASSWORD: kol_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kol_user -d kol_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kol-booking-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kol_booking
      SPRING_DATASOURCE_USERNAME: kol_user
      SPRING_DATASOURCE_PASSWORD: kol_secret
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:5173
      APP_AI_SERVICE_BASE_URL: ${APP_AI_SERVICE_BASE_URL:-http://host.docker.internal:8001/api/v1}
      APP_INTERNAL_TOKEN: ${APP_INTERNAL_TOKEN:-}
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: -Xmx512m -Xms256m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
