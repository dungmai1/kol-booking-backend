spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://kol-booking-frontend.vercel.app}

app.mail.dev-mode=false
app.mail.app-url=${APP_URL:http://localhost:8080}
app.mail.frontend-url=${APP_FRONTEND_URL:https://kol-booking-frontend.vercel.app}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@example.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:dummy-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Payment
app.payment.mock.secret=${PAYMENT_MOCK_SECRET:change-me-in-prod}
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/return}

logging.level.kolbooking.datn=INFO
