spring.application.name=kol-booking-backend
spring.profiles.active=dev

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
management.health.mail.enabled=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8081

# JWT
app.jwt.secret=${APP_JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1kZXYtb25seS1kb250LXVzZS1pbi1wcm9kdWN0aW9u}
app.jwt.access-token-ttl-seconds=900
app.jwt.refresh-token-ttl-seconds=604800
app.internal.token=${APP_INTERNAL_TOKEN:}

# AI Assistant service
app.ai-service.base-url=${APP_AI_SERVICE_BASE_URL:http://localhost:8001/api/v1}

# Verification tokens
app.verification.email-token-ttl-hours=24
app.verification.password-reset-token-ttl-hours=2

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173

# Mail — default provider is smtp (spring.mail.*). Set app.mail.provider=resend to use Resend API.
app.mail.provider=${APP_MAIL_PROVIDER:smtp}
app.mail.from=${APP_MAIL_FROM:no-reply@kolbooking.local}
app.mail.dev-mode=${APP_MAIL_DEV_MODE:true}
app.mail.app-url=${APP_URL:http://localhost:8081}
app.mail.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.mail.resend.api-key=${RESEND_API_KEY:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# File upload limits (Spring servlet cap; app validates 5 MB images / 100 MB video in FileStorageService)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Storage provider: local (dev default) or r2 — override via APP_STORAGE_PROVIDER in .env
app.storage.provider=${APP_STORAGE_PROVIDER:local}
app.storage.local.root=uploads
app.storage.public-url-prefix=/uploads

# Cloudflare R2 (only used when app.storage.provider=r2)
app.storage.r2.account-id=${CF_R2_ACCOUNT_ID:}
app.storage.r2.access-key-id=${CF_R2_ACCESS_KEY_ID:}
app.storage.r2.secret-access-key=${CF_R2_SECRET_ACCESS_KEY:}
app.storage.r2.bucket=${CF_R2_BUCKET:}
app.storage.r2.public-url=${CF_R2_PUBLIC_URL:}

# Platform fee (commission %)
app.platform.fee-percent=10

# Payment - mock provider (dev/test). Webhooks are HMAC-signed with this secret.
app.payment.mock.secret=dev-mock-secret

# Payment - VNPay sandbox. Set VNPAY_TMN_CODE + VNPAY_HASH_SECRET in .env to enable.
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8081/api/v1/payments/vnpay/return}

# Booking scheduler intervals
app.booking.pending-expire-days=7
app.booking.auto-complete-days=3
