spring.application.name=kol-booking-backend
spring.profiles.active=dev

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
management.health.mail.enabled=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080

# JWT
app.jwt.secret=${APP_JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1kZXYtb25seS1kb250LXVzZS1pbi1wcm9kdWN0aW9u}
app.jwt.access-token-ttl-seconds=900
app.jwt.refresh-token-ttl-seconds=604800

# Verification tokens
app.verification.email-token-ttl-hours=24
app.verification.password-reset-token-ttl-hours=2

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173

# Mail
app.mail.from=no-reply@kolbooking.local
app.mail.dev-mode=true
app.mail.app-url=http://localhost:8080
app.mail.frontend-url=http://localhost:3000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# Local file storage (dev)
app.storage.local.root=uploads
app.storage.public-url-prefix=/uploads

# Platform fee (commission %)
app.platform.fee-percent=10

# Payment - mock provider (dev/test). Webhooks are HMAC-signed with this secret.
app.payment.mock.secret=dev-mock-secret

# Payment - VNPay sandbox. Leave tmn-code/hash-secret blank to disable VNPay locally.
app.payment.vnpay.tmn-code=
app.payment.vnpay.hash-secret=
app.payment.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
app.payment.vnpay.return-url=http://localhost:8080/api/v1/payments/vnpay/return

# Booking scheduler intervals
app.booking.pending-expire-days=7
app.booking.auto-complete-days=3
